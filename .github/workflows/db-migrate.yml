name: Database migrate

# Applies supabase/migrations/ to the linked Supabase project using
# repository secrets — credentials never leave Actions.  Runs on manual
# dispatch (once this file reaches the default branch) and on branch pushes
# that change the migrations, so a migration change is applied without
# waiting for a merge.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - agent/agents-console
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"

permissions:
  contents: read

concurrency:
  group: creditops-db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.54.11

      - name: Link project
        run: supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"

      - name: Apply migrations
        run: supabase db push --include-all

      - name: List applied migrations
        run: supabase migration list
